<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASD VPS — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--accent:#00ff88;--accent-dim:rgba(0,255,136,0.15);--accent-glow:rgba(0,255,136,0.4);--bg:#030305;--card-bg:rgba(10,10,12,0.75);--text:#e0e0e0}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}

    /* Background gradient - MAX FAST */
    .bg-gradient{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 50%,rgba(0,255,136,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,rgba(0,100,255,0.05) 0%,transparent 50%),radial-gradient(ellipse at 50% 100%,rgba(255,0,128,0.03) 0%,transparent 50%);animation:bgPulse 1s ease-in-out infinite}
    @keyframes bgPulse{0%,100%{opacity:0.8}50%{opacity:1}}

    /* Matrix canvas - MAX FAST */
    canvas{position:fixed;inset:0;z-index:1;opacity:0.6}

    /* Floating particles - MAX FAST */
    .particles{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
    .particle{position:absolute;width:2px;height:2px;background:var(--accent);border-radius:50%;opacity:0;animation:floatUp linear infinite;box-shadow:0 0 6px var(--accent)}
    @keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:0.8}90%{opacity:0.8}100%{transform:translateY(-10vh) scale(1);opacity:0}}

    /* Scanline effect */
    .scanlines{position:fixed;inset:0;z-index:3;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);opacity:0.3}

    /* Main wrapper */
    .wrap{position:relative;z-index:10;width:100%;max-width:340px;padding:0 16px;perspective:1000px}

    /* Glass card */
    .card{background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(0,255,136,0.2);border-radius:12px;padding:28px 24px;box-shadow:0 0 60px rgba(0,255,136,0.1),inset 0 1px 0 rgba(255,255,255,0.05),0 20px 50px rgba(0,0,0,0.5);position:relative;overflow:hidden;animation:cardEntry 0.3s ease-out}
    @keyframes cardEntry{0%{transform:translateY(20px) rotateX(5deg);opacity:0}100%{transform:translateY(0) rotateX(0);opacity:1}}

    /* Card shine - MAX FAST */
    .card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 30%,rgba(0,255,136,0.03) 50%,transparent 70%);animation:shine 0.8s ease-in-out infinite;pointer-events:none}
    @keyframes shine{0%,100%{transform:translateX(-100%) translateY(-100%)}50%{transform:translateX(100%) translateY(100%)}}

    /* Top glow bar - MAX FAST */
    .card-top-bar{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);border-radius:12px 12px 0 0;animation:glowBar 0.4s ease-in-out infinite}
    @keyframes glowBar{0%,100%{opacity:0.5;box-shadow:0 0 10px var(--accent)}50%{opacity:1;box-shadow:0 0 30px var(--accent)}}

    /* Logo */
    .logo-line{display:flex;align-items:center;gap:8px;margin-bottom:4px;justify-content:center}
    .logo-bracket{color:var(--accent);font-size:18px;opacity:0.7;font-weight:300;animation:bracketPulse 0.3s ease-in-out infinite}
    @keyframes bracketPulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
    .logo-text{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:var(--accent);letter-spacing:3px;text-shadow:0 0 20px var(--accent-glow),0 0 40px var(--accent-dim);animation:textGlitch 0.8s infinite}
    @keyframes textGlitch{0%,90%,100%{text-shadow:0 0 20px var(--accent-glow),0 0 40px var(--accent-dim)}92%{text-shadow:2px 0 #ff0040,-2px 0 #00d4ff,0 0 20px var(--accent-glow)}94%{text-shadow:-2px 0 #ff0040,2px 0 #00d4ff,0 0 20px var(--accent-glow)}96%{text-shadow:0 0 20px var(--accent-glow),0 0 40px var(--accent-dim)}}

    .sub{text-align:center;font-size:8px;color:rgba(0,255,136,0.5);letter-spacing:3px;margin-bottom:20px;font-weight:300}

    /* Status - MAX FAST */
    .status-bar{display:flex;align-items:center;gap:6px;margin-bottom:16px;padding:8px 12px;background:rgba(0,255,136,0.05);border:1px solid rgba(0,255,136,0.15);border-radius:6px}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:statusPulse 0.3s ease-in-out infinite}
    @keyframes statusPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
    .status-text{font-size:9px;color:rgba(0,255,136,0.7);letter-spacing:2px}
    .status-text::after{content:'_';animation:cursor 0.15s step-end infinite}
    @keyframes cursor{0%,100%{opacity:1}50%{opacity:0}}

    /* Error box - MAX FAST */
    .error-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-left:3px solid #ef4444;border-radius:6px;padding:8px 12px;font-size:10px;color:#f87171;margin-bottom:14px;display:flex;align-items:center;gap:8px;animation:errorShake 0.1s ease-in-out}
    @keyframes errorShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

    /* Form fields */
    .field{margin-bottom:12px;position:relative}
    .field-label{font-size:8px;color:rgba(0,255,136,0.6);letter-spacing:3px;display:block;margin-bottom:5px;font-weight:500;transition:color 0.3s}
    .field:focus-within .field-label{color:var(--accent)}

    input[type=text],input[type=password]{width:100%;padding:10px 12px;background:rgba(12,12,15,0.8);border:1px solid rgba(100,116,139,0.3);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;transition:all 0.3s;position:relative}
    input[type=text]:focus,input[type=password]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,255,136,0.1),0 0 20px rgba(0,255,136,0.1);background:rgba(12,12,15,0.95)}
    input::placeholder{color:#334155;transition:color 0.3s}
    input:focus::placeholder{color:rgba(0,255,136,0.3)}

    .input-icon{position:absolute;right:12px;top:32px;color:rgba(0,255,136,0.3);font-size:12px;transition:color 0.3s}
    .field:focus-within .input-icon{color:var(--accent)}

    .pw-wrap{position:relative}
    .pw-wrap input{padding-right:40px}
    .eye-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(0,255,136,0.4);font-size:13px;padding:5px;line-height:1;transition:all 0.3s;border-radius:4px}
    .eye-btn:hover{color:var(--accent);background:rgba(0,255,136,0.1)}

    /* Auth button - MAX FAST */
    .auth-btn{width:100%;padding:10px;background:linear-gradient(135deg,rgba(0,255,136,0.1) 0%,rgba(0,255,136,0.05) 100%);border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:4px;cursor:pointer;transition:all 0.3s;box-shadow:0 0 20px rgba(0,255,136,0.1);position:relative;overflow:hidden;margin-top:4px}
    .auth-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,255,136,0.2),transparent);transition:left 0.2s}
    .auth-btn:hover::before{left:100%}
    .auth-btn:hover{background:linear-gradient(135deg,rgba(0,255,136,0.2) 0%,rgba(0,255,136,0.1) 100%);box-shadow:0 0 40px rgba(0,255,136,0.3);transform:translateY(-2px)}
    .auth-btn:active{transform:translateY(0)}

    /* Footer */
    .footer{text-align:center;margin-top:20px;font-size:7px;color:#1e293b;letter-spacing:2px;line-height:2}
    .footer .warning{color:rgba(239,68,68,0.6);animation:warningPulse 0.4s ease-in-out infinite}
    @keyframes warningPulse{0%,100%{opacity:0.6}50%{opacity:1}}

    /* Corner decorations */
    .corner{position:absolute;width:14px;height:14px;border:2px solid var(--accent);opacity:0.3}
    .corner-tl{top:8px;left:8px;border-right:none;border-bottom:none}
    .corner-tr{top:8px;right:8px;border-left:none;border-bottom:none}
    .corner-bl{bottom:8px;left:8px;border-right:none;border-top:none}
    .corner-br{bottom:8px;right:8px;border-left:none;border-top:none}

    /* Loading spinner - MAX FAST */
    .spinner{display:none;width:12px;height:12px;border:2px solid rgba(0,255,136,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.2s linear infinite;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .auth-btn.loading .spinner{display:inline-block}
    .auth-btn.loading .btn-text{opacity:0.7}

    @media(max-width:380px){.card{padding:20px 16px}.logo-text{font-size:14px}.wrap{max-width:100%}}
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <canvas id="matrix"></canvas>
  <div class="particles" id="particles"></div>
  <div class="scanlines"></div>

  <div class="wrap">
    <div class="card">
      <div class="card-top-bar"></div>
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <div class="logo-line">
        <span class="logo-bracket">[</span>
        <span class="logo-text">ASD VPS</span>
        <span class="logo-bracket">]</span>
      </div>
      <div class="sub">SECURE CLOUD CONTROL PANEL v3.0</div>

      <div class="status-bar">
        <div class="status-dot"></div>
        <div class="status-text">SYSTEM ONLINE</div>
      </div>

      <form method="POST" action="/login" id="loginForm">
        <div class="field">
          <label class="field-label">USERNAME</label>
          <input type="text" name="username" placeholder="enter username" required autocomplete="username" id="username">
          <span class="input-icon">⌘</span>
        </div>
        <div class="field">
          <label class="field-label">PASSWORD</label>
          <div class="pw-wrap">
            <input type="password" name="password" id="pw" placeholder="enter password" autocomplete="current-password">
            <button type="button" class="eye-btn" onclick="togglePw()" aria-label="Toggle password">👁</button>
          </div>
        </div>
        <button type="submit" class="auth-btn" id="authBtn">
          <span class="spinner"></span>
          <span class="btn-text">&gt;_ AUTHENTICATE</span>
        </button>
      </form>

      <div class="footer">
        <span class="warning">⚠ UNAUTHORIZED ACCESS PROHIBITED</span><br>
        ASD SECURE SYSTEMS · ALL ACTIONS LOGGED<br>
        <span style="color:rgba(0,255,136,0.3)">ENCRYPTED CONNECTION</span>
      </div>
    </div>
  </div>

  <script>
    // Matrix rain - MAX FAST (8ms)
    const canvas=document.getElementById('matrix'),ctx=canvas.getContext('2d');
    function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
    resize();addEventListener('resize',resize);
    const chars='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';
    let cols=Math.floor(canvas.width/14),drops=Array(cols).fill(1);
    setInterval(()=>{
      ctx.fillStyle='rgba(3,3,5,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle='rgba(0,255,136,0.15)';ctx.font='13px JetBrains Mono';
      for(let i=0;i<drops.length;i++){
        const char=chars[Math.floor(Math.random()*chars.length)];
        const x=i*14,y=drops[i]*14;
        ctx.fillText(char,x,y);
        if(y>canvas.height&&Math.random()>0.975)drops[i]=0;
        drops[i]++;
      }
    },8);

    // Floating particles - MAX FAST (0.5-1.5s)
    const particlesContainer=document.getElementById('particles');
    for(let i=0;i<50;i++){
      const p=document.createElement('div');
      p.className='particle';
      p.style.left=Math.random()*100+'%';
      p.style.animationDuration=(Math.random()*1+0.5)+'s';
      p.style.animationDelay=(Math.random()*1)+'s';
      p.style.width=(Math.random()*3+1)+'px';
      p.style.height=p.style.width;
      particlesContainer.appendChild(p);
    }

    // Password toggle
    function togglePw(){
      const p=document.getElementById('pw');
      p.type=p.type==='password'?'text':'password';
    }

    // Form loading state
    document.getElementById('loginForm').addEventListener('submit',function(){
      document.getElementById('authBtn').classList.add('loading');
      document.querySelector('.btn-text').textContent='AUTHENTICATING...';
    });

    // Input focus effects
    document.querySelectorAll('input').forEach(input=>{
      input.addEventListener('focus',()=>{
        input.parentElement.style.transform='scale(1.02)';
        input.parentElement.style.transition='transform 0.3s';
      });
      input.addEventListener('blur',()=>{
        input.parentElement.style.transform='scale(1)';
      });
    });
  </script>
</body>
</html>
